name: Build KuzenBot Installer

# Skrypt uruchomi się automatycznie przy każdym 'git push' na główną gałąź
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Ta opcja pozwala na ręczne odpalenie skryptu przyciskiem na stronie GitHuba

jobs:
  build:
    # Używamy wirtualnej maszyny z systemem Windows (ma wbudowany Inno Setup!)
    runs-on: windows-latest

    steps:
    - name: Pobranie kodu repozytorium
      uses: actions/checkout@v4

    - name: Konfiguracja środowiska Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Zmień na wersję, której używasz (np. 3.10 lub 3.12)

    - name: Instalacja zależności
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Budowanie aplikacji (PyInstaller)
      run: pyinstaller KuzenBot.spec

    - name: Kompilacja instalatora (Inno Setup)
      # Ścieżka do preinstalowanego Inno Setup na serwerach GitHub Actions
      run: |
        "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" kuzenbot_installer.iss

    - name: Publikacja instalatora
      uses: actions/upload-artifact@v4
      with:
        name: KuzenBot_Installer
        # Ścieżka, z której GitHub pobierze gotowy plik po zakończeniu pracy Inno Setup
        path: Output/KuzenBot_Setup.exe