name: Zbuduj KuzenBot (PyInstaller + Inno Setup)

# Ta sekcja mówi, że chcemy uruchamiać budowanie RĘCZNIE na kliknięcie
on:
  workflow_dispatch:

jobs:
  build:
    name: Budowanie instalatora Windows
    runs-on: windows-latest # Odpalamy na najnowszym, czystym Windowsie

    steps:
      # 1. Pobranie Twojego kodu z repozytorium
      - name: Pobierz kod z GitHuba
        uses: actions/checkout@v4

      # 2. Instalacja świeżego Pythona (wpisz wersję, której używasz, np. 3.11)
      - name: Przygotuj środowisko Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      # 3. Instalacja bibliotek i PyInstallera
      - name: Zainstaluj biblioteki
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # 4. Kompilacja do pliku .exe
      - name: Zbuduj plik .exe przez PyInstaller
        run: pyinstaller --clean KuzenBot.spec

      # 5. Zbudowanie instalatora przez Inno Setup
      # Serwery GitHub Windows mają wbudowany kompilator ISCC
      - name: Zbuduj instalator (Inno Setup)
        run: iscc kuzenbot_installer.iss

      # 6. Udostępnienie gotowego pliku do pobrania
      # Zakładam, że Twój Inno Setup wypluwa plik do folderu "Output"
      - name: Prześlij gotowy instalator
        uses: actions/upload-artifact@v4
        with:
          name: KuzenBot-Instalator
          path: Output/